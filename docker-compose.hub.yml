# dbplayground — run the fleet straight from GHCR, no repo checkout needed:
#   docker compose -f docker-compose.hub.yml up
# Override the image tag with DBP_TAG (defaults to latest), ports with *_PORT.
# Redis and Valkey are seeded in-container (demo keys); OpenLDAP uses a baked
# GHCR image (pre-seeded test directory). Memcached starts empty — no
# persistence mechanism exists for it.

name: dbplayground

services:
  postgres:
    image: ghcr.io/codedeviate/dbplayground-postgres:${DBP_TAG:-latest}
    container_name: dbp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-testdb}
      POSTGRES_USER: ${DB_USER:-playground}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-playground}
    ports: ["${PG_PORT:-15432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-playground} -d ${DB_NAME:-testdb}"]
      interval: 5s
      timeout: 5s
      retries: 15

  mysql:
    image: ghcr.io/codedeviate/dbplayground-mysql:${DBP_TAG:-latest}
    container_name: dbp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-testdb}
      MYSQL_USER: ${DB_USER:-playground}
      MYSQL_PASSWORD: ${DB_PASSWORD:-playground}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpw}
    ports: ["${MYSQL_PORT:-13306}:3306"]
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=${DB_ROOT_PASSWORD:-rootpw} mysqladmin ping -h localhost -uroot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  mariadb:
    image: ghcr.io/codedeviate/dbplayground-mariadb:${DBP_TAG:-latest}
    container_name: dbp-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-testdb}
      MARIADB_USER: ${DB_USER:-playground}
      MARIADB_PASSWORD: ${DB_PASSWORD:-playground}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpw}
    ports: ["${MARIADB_PORT:-13307}:3306"]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  clickhouse:
    image: ghcr.io/codedeviate/dbplayground-clickhouse:${DBP_TAG:-latest}
    container_name: dbp-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-testdb}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-playground}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-playground}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-18123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-19000}:9000"
    ulimits:
      nofile: {soft: 262144, hard: 262144}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: dbp-redis
    restart: unless-stopped
    ports: ["${REDIS_PORT:-16379}:6379"]
    command:
      - sh
      - -c
      - |
        ( until redis-cli ping >/dev/null 2>&1; do sleep 0.2; done
          redis-cli SET demo:greeting "hello from dbplayground"
          redis-cli SET product:1 "Widget"
          redis-cli SET product:2 "Gadget"
          redis-cli HSET customer:1 name "Alice Andersson" email "alice@example.com" country "SE"
          redis-cli HSET customer:2 name "Bob Bauer" email "bob@example.com" country "DE"
          redis-cli DEL recent_orders
          redis-cli RPUSH recent_orders 1 2 3 4 ) &
        exec docker-entrypoint.sh redis-server
    healthcheck:
      test: ["CMD-SHELL", "[ \"$$(redis-cli exists demo:greeting)\" = \"1\" ]"]
      interval: 5s
      timeout: 5s
      retries: 15

  valkey:
    image: valkey/valkey:8-alpine
    container_name: dbp-valkey
    restart: unless-stopped
    ports: ["${VALKEY_PORT:-16380}:6379"]
    command:
      - sh
      - -c
      - |
        ( until valkey-cli ping >/dev/null 2>&1; do sleep 0.2; done
          valkey-cli SET demo:greeting "hello from dbplayground"
          valkey-cli SET product:1 "Widget"
          valkey-cli SET product:2 "Gadget"
          valkey-cli HSET customer:1 name "Alice Andersson" email "alice@example.com" country "SE"
          valkey-cli HSET customer:2 name "Bob Bauer" email "bob@example.com" country "DE"
          valkey-cli DEL recent_orders
          valkey-cli RPUSH recent_orders 1 2 3 4 ) &
        exec docker-entrypoint.sh valkey-server
    healthcheck:
      test: ["CMD-SHELL", "[ \"$$(valkey-cli exists demo:greeting)\" = \"1\" ]"]
      interval: 5s
      timeout: 5s
      retries: 15

  memcached:
    image: memcached:1.6-alpine
    container_name: dbp-memcached
    restart: unless-stopped
    ports: ["${MEMCACHED_PORT:-13211}:11211"]

  openldap:
    image: ghcr.io/codedeviate/dbplayground-openldap:${DBP_TAG:-latest}
    container_name: dbp-openldap
    profiles: ["ldap"]
    restart: unless-stopped
    command: ["--copy-service"]
    environment:
      LDAP_ORGANISATION: ${LDAP_ORGANISATION:-dbplayground}
      LDAP_DOMAIN: ${LDAP_DOMAIN:-example.org}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD:-adminpw}
    ports:
      - "${LDAP_PORT:-13389}:389"
      - "${LDAPS_PORT:-16636}:636"
    healthcheck:
      test: ["CMD-SHELL", "BASE=dc=$$(echo $$LDAP_DOMAIN | sed 's/\\./,dc=/g'); ldapsearch -x -H ldap://localhost -b \"$$BASE\" -D \"cn=admin,$$BASE\" -w \"$$LDAP_ADMIN_PASSWORD\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
